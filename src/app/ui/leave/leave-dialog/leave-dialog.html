<!-- HEADER -->
<h4 class="bg-blue-800 text-lg px-5 py-3 font-semibold text-white rounded-t-xl">
  Apply Leave
</h4>

<mat-dialog-content class="dialog-content">
  <form [formGroup]="leaveForm" class="space-y-6">

    <!-- Leave Type -->
    <div>
      <label class="block text-sm font-medium mb-2 text-gray-700">
        Leave type
      </label>

      <mat-radio-group
        formControlName="leaveType"
        class="flex gap-2">
        <mat-radio-button
          *ngFor="let item of leaveTypesJson"
          [value]="item.value">
          {{ item.label }}
        </mat-radio-button>
      </mat-radio-group>

      <p class="text-xs text-gray-500 mt-1 italic">
        (Available balances shown on selection)
      </p>
    </div>

    <!-- Half Day -->
    <div class="flex items-center gap-3">
      <mat-checkbox formControlName="halfDay">
        Half‑day
      </mat-checkbox>
    </div>

    <!-- Dates -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <mat-form-field appearance="outline">
        <mat-label>From date</mat-label>
        <input matInput [matDatepicker]="fromPicker" formControlName="startDate">
        <mat-datepicker-toggle matSuffix [for]="fromPicker"></mat-datepicker-toggle>
        <mat-datepicker #fromPicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>To date</mat-label>
        <input matInput [matDatepicker]="toPicker" formControlName="endDate">
        <mat-datepicker-toggle matSuffix [for]="toPicker"></mat-datepicker-toggle>
        <mat-datepicker #toPicker></mat-datepicker>
      </mat-form-field>
    </div>

    <!-- Apply To -->
    <div>
      <label class="block text-sm font-medium mb-2 text-gray-700">
        Apply to
      </label>

      <mat-form-field appearance="outline" class="w-full md:w-1/2">
        <mat-select formControlName="applyTo">
          <mat-option *ngFor="let item of applyTo" [value]="item.value">
            {{ item.label }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <!-- Reason -->
    <div>
      <label class="block text-sm font-medium mb-2 text-gray-700">
        Reason
      </label>

      <mat-form-field appearance="outline" class="w-full">
        <textarea
          matInput
          rows="3"
          formControlName="reason"
          placeholder="Enter leave reason..."
          class="resize-none">
        </textarea>

        <mat-hint align="end">
          {{ leaveForm.get('reason')?.value?.length || 0 }}/500
        </mat-hint>
      </mat-form-field>
    </div>

  </form>
</mat-dialog-content>

<!-- ACTIONS -->
<mat-dialog-actions align="end" class="px-6 py-4 bg-gray-100 border-t">
  <button mat-stroked-button color="primary" (click)="submit()">
    Apply
  </button>

  <button mat-button color="warn" (click)="cancel()">
    Cancel
  </button>
</mat-dialog-actions>
