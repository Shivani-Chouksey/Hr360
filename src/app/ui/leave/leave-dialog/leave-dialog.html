<!-- HEADER -->
<h4 class="bg-blue-800  text-lg  px-4 py-3 text-white ">
  Apply Leave
</h4>

<mat-dialog-content class="px-5 py-6 space-y-6 bg-gray-50">

  <form action="" [formGroup]="leaveForm">

    <!-- Leave Type (Radio Buttons Like Screenshot) -->
    <div>
      <label class="block text-sm font-medium mb-2 text-gray-700">Leave type:</label>

      <div class="flex flex-wrap gap-6">
        <mat-radio-group formControlName="leaveType">
          @for (item of leaveTypesJson; track $index) {
          <mat-radio-button value={{item.value}}>{{item.label}}</mat-radio-button>
          }
        </mat-radio-group>

      </div>

      <p class="text-xs text-gray-500 mt-1 italic">
        (Available balances shown when selected)
      </p>
    </div>

    <!-- Half Day -->
    <div class="flex items-center gap-3">
      <mat-checkbox formControlName="halfDay"></mat-checkbox>
      <span class="text-sm text-gray-700">Half‑day</span>
    </div>

    <!-- Dates Section -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-5 items-end">

      <!-- Label -->
      <div>
        <label class="block text-sm font-medium mb-2 text-gray-700">Select Date:</label>
        <span class="invisible">placeholder</span>
      </div>

      <!-- From Date -->
<mat-form-field appearance="outline">
  <mat-label>From</mat-label>
  <input matInput [matDatepicker]="picker" formControlName="startDate">
  <mat-hint>MM/DD/YYYY</mat-hint>
  <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
  <mat-datepicker #picker></mat-datepicker>
</mat-form-field>

  

      <!-- To Date -->
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>To</mat-label>
        <input matInput [matDatepicker]="picker2" formControlName="endDate" />
        <mat-datepicker-toggle matSuffix [for]="picker2"></mat-datepicker-toggle>
        <mat-datepicker #picker2></mat-datepicker>
      </mat-form-field>
    </div>

    <!-- Apply To -->
    <div>
      <label class="block text-sm font-medium mb-2 text-gray-700">Apply to:</label>

      <mat-form-field appearance="outline" class="w-full md:w-1/2">
        <mat-select formControlName="applyTo">
          <mat-option *ngFor="let item of applyTo" [value]="item.value">
            {{ item.label }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <!-- Reason -->
    <div>
      <label class="block text-sm font-medium mb-2 text-gray-700">Reason:</label>

      <mat-form-field appearance="outline" class="w-full">
        <textarea matInput rows="3" formControlName="reason" placeholder="Enter your leave reason..."
          class="resize-none"></textarea>
        <mat-hint [align]="'end'">
          {{ (leaveForm.get('reason')?.value?.length || 0) }}/500
        </mat-hint>
      </mat-form-field>
    </div>

  </form>
</mat-dialog-content>



<!-- ACTIONS -->
<mat-dialog-actions [align]="'end'" class="px-5 py-4 bg-gray-100 rounded-b-xl flex gap-3 border-t">
  <button mat-stroked-button color="primary" (click)="submit()" class="px-6">
    Apply
  </button>

  <button mat-button color="warn" (click)="cancel()" class="px-6">
    Cancel
  </button>
</mat-dialog-actions>
