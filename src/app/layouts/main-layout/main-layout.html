<!-- main-layout.component.html -->
<div
  class="flex h-dvh bg-gray-50 text-gray-900 dark:bg-neutral-900 dark:text-neutral-100 selection:bg-primary-200/60 dark:selection:bg-primary-400/30">

  <!-- Mobile overlay -->
  <div class="fixed inset-0 z-30 bg-black/50 backdrop-blur-sm lg:hidden" *ngIf="mobileSidebarOpen"
    (click)="mobileSidebarOpen = false" aria-hidden="true">
  </div>

  <!-- Sidebar -->
  <aside class="fixed inset-y-0 left-0 z-40 w-55 bg-white/90 dark:bg-neutral-800/90 border-r border-gray-200/70 dark:border-neutral-700/70 shadow-sm
           backdrop-blur supports-[backdrop-filter]:bg-white/70 dark:supports-[backdrop-filter]:bg-neutral-800/70
           overflow-y-auto will-change-transform transition-transform duration-300 ease-out
           lg:static lg:translate-x-0" [class.-translate-x-full]="!mobileSidebarOpen"
    [attr.aria-hidden]="!mobileSidebarOpen && !isDesktop ? 'true' : 'false'" aria-label="Main navigation">

    <!-- Brand -->
    <div
      class="sticky top-0 z-10 bg-white/80 dark:bg-neutral-800/80 border-b border-gray-200/70 dark:border-neutral-700/70 backdrop-blur">
      <div class="px-4 py-3 flex items-center justify-between">
        <div class="flex  justify-between gap-3" appHighlightCustomDirective>
          <div>
            <mat-icon class="">laptop_windows</mat-icon>
          </div>
          <div>
            <h1 class="text-[16px] font-bold tracking-wide"> HR360</h1>
            <span class="text-[8px] text-gray-500 dark:text-neutral-400">Employee Management Application</span>

          </div>
        </div>
        <button
          class="p-2 rounded-md hover:bg-gray-100 dark:hover:bg-neutral-700 lg:hidden focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
          (click)="mobileSidebarOpen = false" aria-label="Close sidebar">
          <svg class="size-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="px-2 py-3 text-[13px] font-medium space-y-1">
      @if (['hr', 'admin'].includes(LoggedInUserDetail?.role)) {
      <ng-container *ngFor="let group of navJsonObject; trackBy: trackGroup">
        <div class="rounded-md">
          <!-- Group header -->
          <button type="button"
            class="flex w-full items-center justify-between rounded-md px-2 py-2 text-gray-600 dark:text-neutral-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-50 dark:hover:bg-neutral-700/60 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
            (click)="toggleGroup(group.group)" [attr.aria-expanded]="isGroupOpen(group.group)"
            [attr.aria-controls]="'group-'+group.group">
            @if (group.icon ==='users') {
            <mat-icon>supervisor_account</mat-icon>
            }@else {
            <mat-icon> table_chart</mat-icon>
            }
            <span class="uppercase text-[11px] tracking-wider ms-0.5"> {{ group.group }}</span>
            <svg class="size-4 transition-transform duration-200" [class.rotate-180]="isGroupOpen(group.group)"
              viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
          </button>

          <!-- Group content -->
          <div [id]="'group-'+group.group" class="overflow-hidden transition-[max-height] duration-300 ease-in-out"
            [style.maxHeight]="isGroupOpen(group.group) ? '1000px' : '0px'">
            <ul class="mt-1 space-y-1">
              <li *ngFor="let item of group.items; trackBy: trackItem" class="pr-2">
                <div class="flex items-center justify-between rounded-md hover:bg-gray-50 dark:hover:bg-neutral-700/60">
                  <a [routerLink]="item.link"
                    routerLinkActive="!text-white font-medium dark:!text-primary-400  bg-primary-50/70 dark:bg-primary-900/25  bg-gradient-to-r from-[#005EB6] to-[#5F9EFB]"
                    [routerLinkActiveOptions]="{ exact: true }"
                    class="flex items-center gap-2 text-gray-800 dark:text-neutral-200 rounded-md px-2 py-2 w-full focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-500">
                    <!-- Optional icon slot: <app-icon [name]="item.icon"></app-icon> -->
                    <span class="truncate">{{ item.label }}</span>
                  </a>

                  <button *ngIf="item.children?.length" type="button"
                    class="p-1 mr-1 rounded hover:bg-gray-100 dark:hover:bg-neutral-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
                    (click)="toggleItem(item._id || item.link)" [attr.aria-expanded]="isItemOpen(item._id || item.link)"
                    [attr.aria-controls]="'item-'+(item._id || item.link)"
                    aria-label="Toggle {{ item.label }} children">
                    <svg class="size-4 transition-transform duration-200"
                      [class.rotate-180]="isItemOpen(item._id || item.link)" viewBox="0 0 24 24" fill="none"
                      stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                    </svg>
                  </button>
                </div>

                <!-- Children -->
                <ul *ngIf="item.children?.length" [id]="'item-'+(item._id || item.link)"
                  class="ml-3 border-l border-gray-200/70 dark:border-neutral-700/70 pl-3 space-y-1 overflow-hidden transition-[max-height] duration-300 ease-in-out"
                  [style.maxHeight]="isItemOpen(item._id || item.link) ? '600px' : '0px'">
                  <li *ngFor="let child of item.children; trackBy: trackLeaf">
                    <a [routerLink]="child._id === 'Emp-pro' ? ['/employee/profile', LoggedInUserDetail.id] : [child.link]"
                      routerLinkActive="text-white dark:text-primary-400   bg-gradient-to-r from-[#005EB6] to-[#5F9EFB]"
                      class="block rounded-md px-2 py-1.5 text-gray-600 dark:text-neutral-300 hover:text-primary-600 dark:hover:text-primary-400 hover:bg-gray-50 dark:hover:bg-neutral-700/60 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-500">
                      {{ child.label }}
                    </a>
                  </li>
                </ul>
              </li>
            </ul>
          </div>
        </div>
      </ng-container>

      }@else {

      <div class="pt-2 mt-2 border-t border-gray-200/70 dark:border-neutral-700/70">
        <a [routerLink]="['/employee/profile', LoggedInUserDetail?.id]"
          routerLinkActive="text-primary-600 dark:text-primary-400 font-semibold bg-primary-50/70 dark:bg-primary-900/25"
          class="block rounded-md px-3 py-2 text-gray-800 dark:text-neutral-200 hover:text-primary-600 dark:hover:text-primary-400 hover:bg-gray-50 dark:hover:bg-neutral-700/60 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-500">
          <mat-icon>supervisor_account</mat-icon> My Profile </a>
      </div>
      <div class="pt-2 mt-2 border-t border-gray-200/70 dark:border-neutral-700/70">
        <a [routerLink]="'/leave'"
          routerLinkActive="text-primary-600 dark:text-primary-400 font-semibold bg-primary-50/70 dark:bg-primary-900/25"
          class="block rounded-md px-3 py-2 text-gray-800 dark:text-neutral-200 hover:text-primary-600 dark:hover:text-primary-400 hover:bg-gray-50 dark:hover:bg-neutral-700/60 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-500">
          Leave
        </a>
      </div>

      }
      <!-- Standalone link -->
      <div class=" flex gap-2 align-center pt-2 mt-2 border-t border-gray-200/70 dark:border-neutral-700/70">


        <a [routerLink]="'/holidays'"
          routerLinkActive="text-white dark:text-primary-400  bg-primary-50/70 dark:bg-primary-900/25  bg-gradient-to-r from-[#005EB6] to-[#5F9EFB]"
          class=" rounded-md px-3 flex gap-2  py-2 text-gray-800 dark:text-neutral-200 hover:text-primary-600 dark:hover:text-primary-400 hover:bg-gray-50 dark:hover:bg-neutral-700/60 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-500">
          <svg width="18" height="20" viewBox="0 0 18 20" fill="black" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M6.7 16.7L5.3 15.3L7.6 13L5.3 10.7L6.7 9.3L9 11.6L11.3 9.3L12.7 10.7L10.4 13L12.7 15.3L11.3 16.7L9 14.4L6.7 16.7ZM2 20C1.45 20 0.979167 19.8042 0.5875 19.4125C0.195833 19.0208 0 18.55 0 18V4C0 3.45 0.195833 2.97917 0.5875 2.5875C0.979167 2.19583 1.45 2 2 2H3V0H5V2H13V0H15V2H16C16.55 2 17.0208 2.19583 17.4125 2.5875C17.8042 2.97917 18 3.45 18 4V18C18 18.55 17.8042 19.0208 17.4125 19.4125C17.0208 19.8042 16.55 20 16 20H2ZM2 18H16V8H2V18ZM2 6H16V4H2V6ZM2 6V4V6Z"
              fill="black" />
          </svg> Holidays
        </a>
      </div>
      <div class="pt-2 mt-2 border-t border-gray-200/70 dark:border-neutral-700/70"
        *ngIf="LoggedInUserDetail?.role=='manager'">
        <svg width="22" height="16" viewBox="0 0 22 16" fill="black" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M0 16V13.2C0 12.6333 0.145833 12.1125 0.4375 11.6375C0.729167 11.1625 1.11667 10.8 1.6 10.55C2.63333 10.0333 3.68333 9.64583 4.75 9.3875C5.81667 9.12917 6.9 9 8 9C9.1 9 10.1833 9.12917 11.25 9.3875C12.3167 9.64583 13.3667 10.0333 14.4 10.55C14.8833 10.8 15.2708 11.1625 15.5625 11.6375C15.8542 12.1125 16 12.6333 16 13.2V16H0ZM18 16V13C18 12.2667 17.7958 11.5625 17.3875 10.8875C16.9792 10.2125 16.4 9.63333 15.65 9.15C16.5 9.25 17.3 9.42083 18.05 9.6625C18.8 9.90417 19.5 10.2 20.15 10.55C20.75 10.8833 21.2083 11.2542 21.525 11.6625C21.8417 12.0708 22 12.5167 22 13V16H18ZM8 8C6.9 8 5.95833 7.60833 5.175 6.825C4.39167 6.04167 4 5.1 4 4C4 2.9 4.39167 1.95833 5.175 1.175C5.95833 0.391667 6.9 0 8 0C9.1 0 10.0417 0.391667 10.825 1.175C11.6083 1.95833 12 2.9 12 4C12 5.1 11.6083 6.04167 10.825 6.825C10.0417 7.60833 9.1 8 8 8ZM18 4C18 5.1 17.6083 6.04167 16.825 6.825C16.0417 7.60833 15.1 8 14 8C13.8167 8 13.5833 7.97917 13.3 7.9375C13.0167 7.89583 12.7833 7.85 12.6 7.8C13.05 7.26667 13.3958 6.675 13.6375 6.025C13.8792 5.375 14 4.7 14 4C14 3.3 13.8792 2.625 13.6375 1.975C13.3958 1.325 13.05 0.733333 12.6 0.2C12.8333 0.116667 13.0667 0.0625 13.3 0.0375C13.5333 0.0125 13.7667 0 14 0C15.1 0 16.0417 0.391667 16.825 1.175C17.6083 1.95833 18 2.9 18 4ZM2 14H14V13.2C14 13.0167 13.9542 12.85 13.8625 12.7C13.7708 12.55 13.65 12.4333 13.5 12.35C12.6 11.9 11.6917 11.5625 10.775 11.3375C9.85833 11.1125 8.93333 11 8 11C7.06667 11 6.14167 11.1125 5.225 11.3375C4.30833 11.5625 3.4 11.9 2.5 12.35C2.35 12.4333 2.22917 12.55 2.1375 12.7C2.04583 12.85 2 13.0167 2 13.2V14ZM8 6C8.55 6 9.02083 5.80417 9.4125 5.4125C9.80417 5.02083 10 4.55 10 4C10 3.45 9.80417 2.97917 9.4125 2.5875C9.02083 2.19583 8.55 2 8 2C7.45 2 6.97917 2.19583 6.5875 2.5875C6.19583 2.97917 6 3.45 6 4C6 4.55 6.19583 5.02083 6.5875 5.4125C6.97917 5.80417 7.45 6 8 6Z"
            fill="#475569" />
        </svg>

        <a [routerLink]="['/employee/team-member',LoggedInUserDetail?.id]"
          routerLinkActive="text-primary-600 dark:text-primary-400 font-normal bg-primary-50/70 dark:bg-primary-900/25"
          class="block rounded-md px-3 py-2 text-gray-800 dark:text-neutral-200 hover:text-primary-600 dark:hover:text-primary-400 hover:bg-gray-50 dark:hover:bg-neutral-700/60 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-500">
          Team Members
        </a>
      </div>
    </nav>
  </aside>

  <!-- Main area -->
  <section class="flex-1 flex flex-col lg:ml-0 min-w-0">

    <!-- App bar -->
    <header
      class="sticky top-0 z-20 flex items-center justify-between bg-white/90 dark:bg-neutral-800/90 backdrop-blur border-b border-gray-200/70 dark:border-neutral-700/70 px-3 lg:px-5 py-2">
      <div class="flex items-center gap-2">
        <!-- Sidebar toggle (mobile) -->
        <button
          class="p-2 rounded-md hover:bg-gray-100 dark:hover:bg-neutral-700 lg:hidden focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
          (click)="mobileSidebarOpen = true" aria-label="Open sidebar">
          <svg class="size-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 6h18M3 12h18M3 18h18" />
          </svg>
        </button>

        <h2 class="text-[14px] font-[500] text-gray-700 dark:text-neutral-100 truncate">
          {{ pageTitle }}
        </h2>
      </div>

      <div class="flex items-center gap-2">
        <!-- Search -->
        <label
          class="hidden md:flex items-center bg-gray-50 dark:bg-neutral-700 rounded-md px-2 py-1.5 focus-within:ring-2 focus-within:ring-primary-500">
          <svg class="size-4 text-gray-500 dark:text-neutral-300" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="7" />
            <path d="M21 21l-4.3-4.3" />
          </svg>
          <input type="search" placeholder="Search..."
            class="bg-transparent outline-none px-2 text-sm w-52 placeholder:text-gray-400 dark:placeholder:text-neutral-300"
            (keyup.enter)="onSearch($event.target.value)" aria-label="Search" />
        </label>

        <!-- Notifications -->
        <button
          class="p-2 rounded-md hover:bg-gray-100 dark:hover:bg-neutral-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
          aria-label="Notifications">
          <svg class="size-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5m6 0a3 3 0 1 1-6 0m6 0H9" />
          </svg>
        </button>

        <!-- User menu -->
        <div class="relative" (keydown.escape)="userMenuOpen=false">
          <!-- <button
            class="flex items-center gap-2 px-2 py-1.5 rounded-md hover:bg-gray-100 dark:hover:bg-neutral-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-500"
            (click)="userMenuOpen = !userMenuOpen"
            aria-haspopup="menu"
            [attr.aria-expanded]="userMenuOpen">
            <img src="/assets/avatar.svg" alt="" class="size-8 rounded-full ring-1 ring-gray-200 dark:ring-neutral-600" />
            <span class="hidden sm:block text-sm">{{ LoggedInUserDetail?.name }} <br>
            <span class="hidden sm:block text-sm">Role : {{ LoggedInUserDetail?.role }} </span>
            
            </span>
            <svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6" />
            </svg>
          </button> -->
          <button type="button" (click)="openUserMenu($event)"
            class="flex items-center gap-2 rounded-md border border-gray-200 bg-white px-3 py-2 text-sm shadow-sm hover:bg-gray-50">
            <span class="inline-flex h-7 w-7 items-center justify-center overflow-hidden rounded-full bg-gray-100">
              <svg class="h-4 w-4 text-gray-500" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 12a5 5 0 100-10 5 5 0 000 10z" />
                <path d="M12 14c-5 0-9 2.5-9 5.5V22h18v-2.5c0-3-4-5.5-9-5.5z" />
              </svg>
            </span>
            <div class="text-left">
              <div class="text-xs font-medium leading-4">{{ LoggedInUserDetail?.name |mask:20 }}</div>
              <div class="text-[10px] text-gray-500 -mt-0.5">{{ LoggedInUserDetail?.role }}</div>
            </div>
          </button>

          <div *ngIf="userMenuOpen" (click)="$event.stopPropagation()"
            class="absolute right-0 mt-2 w-56 origin-top-right bg-white dark:bg-neutral-800 shadow-lg rounded-md border border-gray-200/70 dark:border-neutral-700/70 z-10 animate-in fade-in slide-in-from-top-1">
            <button (click)="gotoProfile(LoggedInUserDetail.id)"
              class="w-full text-left px-3 py-2 rounded-md hover:bg-gray-50 dark:hover:bg-neutral-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-500">
              Profile
            </button>
            <button
              class="w-full text-left px-3 py-2 rounded-md hover:bg-gray-50 dark:hover:bg-neutral-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-500">
              Settings
            </button>
            <div class="my-1 h-px bg-gray-200/80 dark:bg-neutral-700/80"></div>
            <button
              class="w-full text-left px-3 py-2 rounded-md text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 focus:outline-none focus-visible:ring-2 focus-visible:ring-red-500"
              (click)="onLogout()">
              Log out
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main
      class="flex-1 p-3 lg:p-2 overflow-y-auto scrollbar-thin scrollbar-thumb-gray-300 scrollbar-track-transparent dark:scrollbar-thumb-neutral-700">

      <ng-container *ngIf="!hasActiveRoute">
        <app-dashboard></app-dashboard>
      </ng-container>

      <router-outlet (activate)="onRouteActivate()" (deactivate)="onRouteDeactivate()"></router-outlet>
    </main>
  </section>
</div>
