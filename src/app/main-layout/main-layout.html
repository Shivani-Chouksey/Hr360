<!-- main-layout.component.html -->
<div class="flex h-screen bg-gray-100 text-gray-900 dark:bg-neutral-900 dark:text-neutral-100">
  <!-- Mobile overlay -->
  <div class="fixed inset-0 bg-black/40 z-30 lg:hidden" *ngIf="mobileSidebarOpen" (click)="mobileSidebarOpen = false"
    aria-hidden="true">
  </div>

  <!-- Sidebar -->
  <aside class="fixed z-40 inset-y-0 left-0 w-72 bg-white dark:bg-neutral-800 border-r border-gray-200 dark:border-neutral-700 shadow-sm overflow-y-auto transform transition-transform duration-300
           lg:static lg:translate-x-0" [class.-translate-x-full]="!mobileSidebarOpen"
    [attr.aria-hidden]="!mobileSidebarOpen && !isDesktop ? 'true' : 'false'">
    <!-- Brand -->
    <div
      class="px-5 py-1 border-b border-gray-200 dark:border-neutral-700 sticky top-0 bg-white/80 dark:bg-neutral-800/80 backdrop-blur">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-xl font-bold tracking-wide">HR360</h1>
          <p class="text-xs text-gray-500 dark:text-neutral-400 -mt-0.5">Employee Management Application</p>
        </div>
        <!-- Collapse button for mobile -->
        <button class="p-2 rounded-md hover:bg-gray-100 dark:hover:bg-neutral-700 lg:hidden"
          (click)="mobileSidebarOpen = false" aria-label="Close sidebar">
          <svg class="w-5 h-5" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="px-3 py-3 text-sm font-medium">
      <ng-container *ngFor="let group of navJsonObject; trackBy: trackGroup">
        <div class="mt-3">
          <!-- Group Header (click to toggle) -->
          <button type="button"
            class="flex w-full items-center justify-between px-2 py-2 text-gray-600 dark:text-neutral-300 font-semibold hover:text-gray-900 dark:hover:text-white"
            (click)="toggleGroup(group.group)" [attr.aria-expanded]="isGroupOpen(group.group)"
            [attr.aria-controls]="'group-'+group.group">
            <span class="uppercase text-[11px] tracking-wider">{{ group.group }}</span>
            <svg class="w-4 h-4 transition-transform" [class.rotate-180]="isGroupOpen(group.group)" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
          </button>

          <!-- Group Content (collapsible) -->
          <div [id]="'group-'+group.group" class="overflow-hidden transition-[max-height] duration-300 ease-in-out"
            [style.maxHeight]="isGroupOpen(group.group) ? '1200px' : '0px'">
            <ul class="mt-1 space-y-1">
              <!-- Items -->
              <li *ngFor="let item of group.items; trackBy: trackItem" class="pr-2">
                <div
                  class="flex items-center justify-between px-2 py-1.5 rounded-md hover:bg-gray-50 dark:hover:bg-neutral-700/60">
                  <a [routerLink]="item.link"
                    routerLinkActive="!text-primary-600 dark:!text-primary-400 !font-semibold bg-primary-50 dark:bg-primary-900/20"
                    [routerLinkActiveOptions]="{ exact: true }"
                    class="flex items-center gap-2 text-gray-800 dark:text-neutral-200 rounded-md px-2 py-1 w-full">
                    <!-- Optional icon slot: <app-icon [name]="item.icon"></app-icon> -->
                    <span class="truncate">{{ item.label }}</span>
                  </a>

                  <!-- Toggle for children (only if children exist) -->
                  <button *ngIf="item.children?.length" type="button"
                    class="p-1 rounded hover:bg-gray-100 dark:hover:bg-neutral-700"
                    (click)="toggleItem(item._id || item.link)" [attr.aria-expanded]="isItemOpen(item._id || item.link)"
                    [attr.aria-controls]="'item-'+(item._id || item.link)"
                    aria-label="Toggle {{ item.label }} children">
                    <svg class="w-4 h-4 transition-transform" [class.rotate-180]="isItemOpen(item._id || item.link)"
                      viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                    </svg>
                  </button>
                </div>

                <!-- Children (collapsible) -->
                <ul *ngIf="item.children?.length" [id]="'item-'+(item._id || item.link)"
                  class="ml-4 border-l border-gray-200 dark:border-neutral-700 pl-3 space-y-1 overflow-hidden transition-[max-height] duration-300 ease-in-out"
                  [style.maxHeight]="isItemOpen(item._id || item.link) ? '600px' : '0px'">
                  <li *ngFor="let child of item.children; trackBy: trackLeaf">

                    <a [routerLink]="child._id === 'Emp-pro'
                  ? ['/employee/profile', loggedInUserId]
                  : [child.link]" routerLinkActive="text-primary-600 dark:text-primary-400 font-semibold"
                      class="block px-2 py-1 text-gray-600 dark:text-neutral-300 hover:text-primary-600 dark:hover:text-primary-400 hover:bg-gray-50 dark:hover:bg-neutral-700/60 rounded-md transition">
                      {{ child.label }}
                    </a>
                  </li>
                </ul>
              </li>
            </ul>
          </div>
        </div>
      </ng-container>

      <!-- Holidays as a standalone link consistent with items -->
      <div class="mt-4 border-t border-gray-200 dark:border-neutral-700 pt-3">
        <a [routerLink]="'/holidays'"
          routerLinkActive="text-primary-600 dark:text-primary-400 font-semibold bg-primary-50 dark:bg-primary-900/20"
          class="block px-3 py-2 text-gray-800 dark:text-neutral-200 hover:text-primary-600 dark:hover:text-primary-400 hover:bg-gray-50 dark:hover:bg-neutral-700/60 rounded-md transition">
          Holidays
        </a>
      </div>
    </nav>
  </aside>

  <!-- Main content area -->
  <section class="flex-1 flex flex-col lg:ml-0">
    <!-- App bar -->
    <header
      class="flex items-center justify-between bg-white dark:bg-neutral-800 border-b border-gray-200 dark:border-neutral-700 px-4 lg:px-6 py-3">
      <div class="flex items-center gap-2">
        <!-- Sidebar toggle (mobile) -->
        <button class="p-2 rounded-md hover:bg-gray-100 dark:hover:bg-neutral-700 lg:hidden"
          (click)="mobileSidebarOpen = true" aria-label="Open sidebar">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 6h18M3 12h18M3 18h18" />
          </svg>
        </button>

        <h2 class="text-lg font-semibold text-gray-700 dark:text-neutral-200 truncate">
          {{ pageTitle || 'Component Name' }}
        </h2>
      </div>

      <div class="flex items-center gap-2">
        <!-- Search (optional) -->
        <div class="hidden md:flex items-center bg-gray-50 dark:bg-neutral-700 rounded-md px-2 py-1">
          <svg class="w-4 h-4 text-gray-500 dark:text-neutral-300" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2">
            <circle cx="11" cy="11" r="7" />
            <path d="M21 21l-4.3-4.3" />
          </svg>
          <input type="search" placeholder="Search..."
            class="bg-transparent outline-none px-2 text-sm w-48 placeholder:text-gray-400 dark:placeholder:text-neutral-300"
            (keyup.enter)="onSearch($event.target.value)" />
        </div>

        <!-- Notifications -->
        <button class="p-2 rounded-md hover:bg-gray-100 dark:hover:bg-neutral-700" aria-label="Notifications">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5m6 0a3 3 0 1 1-6 0m6 0H9" />
          </svg>
        </button>

        <!-- User menu -->
        <div class="relative" (keydown.escape)="userMenuOpen=false">
          <button class="flex items-center gap-2 px-2 py-1 rounded-md hover:bg-gray-100 dark:hover:bg-neutral-700"
            (click)="userMenuOpen = !userMenuOpen" aria-haspopup="menu" [attr.aria-expanded]="userMenuOpen">
            <img src="/assets/avatar.svg" alt=""
              class="w-7 h-7 rounded-full ring-1 ring-gray-200 dark:ring-neutral-600" />
            <span class="hidden sm:block text-sm">{{ currentUser?.name || 'User' }}</span>
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 9l6 6 6-6" />
            </svg>
          </button>

          <div *ngIf="userMenuOpen"
            class="absolute right-0 mt-2 w-48 bg-white dark:bg-neutral-800 shadow-lg rounded-md border border-gray-200 dark:border-neutral-700 z-10">
            <button class="w-full text-left px-3 py-2 hover:bg-gray-50 dark:hover:bg-neutral-700">Profile</button>
            <button class="w-full text-left px-3 py-2 hover:bg-gray-50 dark:hover:bg-neutral-700">Settings</button>
            <div class="h-px bg-gray-200 dark:bg-neutral-700 my-1"></div>
            <button
              class="w-full text-left px-3 py-2 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20"
              (click)="onLogout()">
              Log out
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main class="flex-1 p-1 lg:p-2 overflow-y-auto">
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
