<!-- Render only when open -->
<div
  *ngIf="open"
  class="app-modal__backdrop"
  role="presentation"
  (mousedown)="onBackdropClick($event)"
>
  <div
    #panel
    class="app-modal__panel"
    role="dialog"
    [attr.aria-modal]="true"
    [attr.aria-labelledby]="title ? 'app-modal-title' : null"
    [attr.aria-describedby]="ariaDescribedBy || null"
    tabindex="-1"
  >
    <header class="app-modal__header">
      <h2 id="app-modal-title" class="app-modal__title" *ngIf="title">{{ title }}</h2>
      <button class="app-modal__close" type="button" aria-label="Close" (click)="close()">
        ✕
      </button>
    </header>

    <section class="app-modal__content">
      <ng-content></ng-content>
    </section>

    <footer class="app-modal__actions">
      <ng-content select="[modal-actions]"></ng-content>
    </footer>
  </div>
</div>
